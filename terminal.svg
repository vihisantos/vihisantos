<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 720 560" width="100%" height="100%">
  <defs>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7AB8A9"/>
      <stop offset="50%" stop-color="#4A8F7E"/>
      <stop offset="100%" stop-color="#3A7F6E"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2A1A"/>
      <stop offset="100%" stop-color="#0A1A0A"/>
    </linearGradient>
    <linearGradient id="bezelShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
    </linearGradient>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="720" height="4">
      <rect x="0" y="0" width="720" height="2" fill="rgba(0,0,0,0.12)"/>
    </pattern>
    <clipPath id="screenClip">
      <rect x="36" y="36" width="648" height="476" rx="12"/>
    </clipPath>
    <filter id="screenShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Sombra externa -->
  <rect x="8" y="8" width="704" height="544" rx="24" fill="rgba(0,0,0,0.3)" filter="url(#screenShadow)"/>

  <!-- Bezel iMac G3 -->
  <rect x="0" y="0" width="720" height="560" rx="24" fill="url(#bezel)"/>
  <rect x="0" y="0" width="720" height="560" rx="24" fill="url(#bezelShine)"/>

  <!-- Screen area -->
  <rect x="36" y="36" width="648" height="476" rx="12" fill="#0D1B0D"/>
  <rect x="36" y="36" width="648" height="476" rx="12" fill="url(#screenGlow)" opacity="0.5"/>

  <!-- Inner shadow on screen -->
  <rect x="36" y="36" width="648" height="476" rx="12" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="3"/>

  <!-- Scanlines (clipped to screen) -->
  <rect x="36" y="36" width="648" height="476" rx="12" fill="url(#scanlines)" clip-path="url(#screenClip)"/>

  <!-- Reflection/shine on bezel -->
  <ellipse cx="360" cy="70" rx="300" ry="40" fill="rgba(255,255,255,0.07)"/>

  <!-- LED indicator -->
  <circle cx="360" cy="526" r="3" fill="#4CAF50" opacity="0.8"/>
  <circle cx="360" cy="526" r="5" fill="#4CAF50" opacity="0.2"/>

  <!-- ==================== TERMINAL OUTPUT ==================== -->

  <style>
    .term { font-family: 'Courier New', 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; }
    .prompt { fill: #4AF626; }
    .info-label { fill: #6AE84A; }
    .info-value { fill: #B8F4A0; }
    .bar-bg { fill: #1A3A1A; }
    .bar-fill { fill: #4AF626; }
    .bar-fill2 { fill: #2D8F2D; }
    .ascii { fill: #5A9E8F; }
    .cursor { fill: #4AF626; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .frame-box { fill: none; stroke: #2A5A3A; stroke-width: 1; stroke-dasharray: 3 3; }
  </style>

  <!-- LEFT COLUMN -->

  <!-- ASCII Capybara logo -->
  <text x="50" y="80" class="term ascii">    ╭──────────────╮</text>
  <text x="50" y="98" class="term ascii">    │   ╭──────╮   │</text>
  <text x="50" y="116" class="term ascii">    │   │ (•-•) │   │</text>
  <text x="50" y="134" class="term ascii">    │   ╰──────╯   │</text>
  <text x="50" y="152" class="term ascii">    │  CAPYBARA   │</text>
  <text x="50" y="170" class="term ascii">    ╰──────────────╯</text>

  <!-- Separador -->
  <text x="50" y="196" class="term prompt"> ────────────────────</text>

  <!-- GIF embedado -->
  <image href="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExMXZzM2hpcDIyemg5Mmc4MnJ3M3dydmxoY3NlajdpY2UyMHA5cHczbSZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PWc/RbDKaczqWovIugyJmW/giphy.gif" x="50" y="216" width="175" height="130" preserveAspectRatio="xMidYMid slice"/>

  <!-- Bordinha no GIF -->
  <rect x="50" y="216" width="175" height="130" rx="4" class="frame-box"/>

  <!-- Separador final -->
  <text x="50" y="370" class="term prompt"> ────────────────────</text>

  <!-- Prompt -->
  <text x="50" y="400" class="term prompt">vihisantos@github ~ $</text>
  <text x="248" y="400" class="term cursor">▌</text>

  <!-- RIGHT COLUMN -->

  <!-- neofetch header -->
  <text x="280" y="80" class="term prompt">vihisantos@github</text>
  <text x="280" y="98" class="term prompt">─────────────────</text>

  <text x="280" y="122" class="term info-label">Name:</text>
  <text x="340" y="122" class="term info-value">Vitor Santos</text>

  <text x="280" y="142" class="term info-label">Role:</text>
  <text x="340" y="142" class="term info-value">CEO &amp; Founder</text>

  <text x="280" y="162" class="term info-label">Org:</text>
  <text x="340" y="162" class="term info-value">Capybara Holding</text>
  <text x="340" y="180" class="term info-value">GitReady</text>

  <text x="280" y="200" class="term info-label">Loc:</text>
  <text x="340" y="200" class="term info-value">Piracicaba - SP</text>

  <text x="280" y="220" class="term info-label">Web:</text>
  <text x="340" y="220" class="term info-value" text-decoration="underline">vihisantos.github.io</text>

  <text x="280" y="240" class="term info-label">Insta:</text>
  <text x="340" y="240" class="term info-value">@vih_isantos__</text>

  <text x="280" y="260" class="term info-label">Shell:</text>
  <text x="340" y="260" class="term info-value">zsh</text>

  <!-- Language bars -->
  <text x="280" y="290" class="term info-label">Lang:</text>

  <text x="340" y="290" class="term prompt">TypeScript</text>
  <rect x="340" y="298" width="180" height="10" rx="3" class="bar-bg"/>
  <rect x="340" y="298" width="148" height="10" rx="3" class="bar-fill"/>
  <text x="535" y="290" class="term info-value">82%</text>

  <text x="340" y="318" class="term prompt">JavaScript</text>
  <rect x="340" y="326" width="180" height="10" rx="3" class="bar-bg"/>
  <rect x="340" y="326" width="32" height="10" rx="3" class="bar-fill2"/>
  <text x="535" y="318" class="term info-value">18%</text>
</svg>
