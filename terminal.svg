<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" width="100%" height="100%">
  <defs>
    <linearGradient id="bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7AB8A9"/>
      <stop offset="50%" stop-color="#4A8F7E"/>
      <stop offset="100%" stop-color="#3A7F6E"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A2A1A"/>
      <stop offset="100%" stop-color="#0A1A0A"/>
    </linearGradient>
    <linearGradient id="bezelShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
    </linearGradient>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="720" height="4">
      <rect x="0" y="0" width="720" height="2" fill="rgba(0,0,0,0.12)"/>
    </pattern>
    <filter id="screenShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Sombra externa -->
  <rect x="8" y="8" width="704" height="444" rx="24" fill="rgba(0,0,0,0.3)" filter="url(#screenShadow)"/>

  <!-- Bezel iMac G3 -->
  <rect x="0" y="0" width="720" height="460" rx="24" fill="url(#bezel)"/>
  <rect x="0" y="0" width="720" height="460" rx="24" fill="url(#bezelShine)"/>

  <!-- Screen area -->
  <rect x="36" y="36" width="648" height="376" rx="12" fill="#0D1B0D"/>
  <rect x="36" y="36" width="648" height="376" rx="12" fill="url(#screenGlow)" opacity="0.5"/>

  <!-- Inner shadow on screen -->
  <rect x="36" y="36" width="648" height="376" rx="12" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="3"/>

  <!-- Scanlines -->
  <rect x="36" y="36" width="648" height="376" rx="12" fill="url(#scanlines)"/>

  <!-- Reflection/shine on bezel -->
  <ellipse cx="360" cy="70" rx="300" ry="40" fill="rgba(255,255,255,0.07)"/>

  <!-- LED indicator -->
  <circle cx="360" cy="426" r="3" fill="#4CAF50" opacity="0.8"/>
  <circle cx="360" cy="426" r="5" fill="#4CAF50" opacity="0.2"/>

  <!-- ==================== TERMINAL OUTPUT ==================== -->

  <style>
    .term { font-family: 'Courier New', 'Cascadia Code', 'Fira Code', monospace; font-size: 14px; }
    .prompt { fill: #4AF626; }
    .info-label { fill: #6AE84A; }
    .info-value { fill: #B8F4A0; }
    .bar-bg { fill: #1A3A1A; }
    .bar-fill { fill: #4AF626; }
    .bar-fill2 { fill: #2D8F2D; }
    .ascii { fill: #5A9E8F; }
    .cursor { fill: #4AF626; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <!-- ASCII Capybara logo -->
  <text x="50" y="85" class="term ascii">    ╭──────────────╮</text>
  <text x="50" y="103" class="term ascii">    │   ╭──────╮   │</text>
  <text x="50" y="121" class="term ascii">    │   │ (•-•) │   │</text>
  <text x="50" y="139" class="term ascii">    │   ╰──────╯   │</text>
  <text x="50" y="157" class="term ascii">    │  CAPYBARA   │</text>
  <text x="50" y="175" class="term ascii">    ╰──────────────╯</text>

  <!-- Separador -->
  <text x="50" y="200" class="term prompt"> ────────────────────</text>

  <!-- neofetch output -->
  <text x="280" y="85" class="term prompt">vihisantos@github</text>
  <text x="280" y="103" class="term prompt">─────────────────</text>

  <text x="280" y="128" class="term info-label">Name:</text>
  <text x="340" y="128" class="term info-value">Vitor Santos</text>

  <text x="280" y="148" class="term info-label">Role:</text>
  <text x="340" y="148" class="term info-value">CEO &amp; Founder</text>

  <text x="280" y="168" class="term info-label">Org:</text>
  <text x="340" y="168" class="term info-value">Capybara Holding</text>
  <text x="340" y="186" class="term info-value">GitReady</text>

  <text x="280" y="206" class="term info-label">Loc:</text>
  <text x="340" y="206" class="term info-value">Piracicaba - SP</text>

  <text x="280" y="226" class="term info-label">Web:</text>
  <text x="340" y="226" class="term info-value">vihisantos.github.io</text>

  <text x="280" y="246" class="term info-label">Insta:</text>
  <text x="340" y="246" class="term info-value">@vih_isantos__</text>

  <text x="280" y="266" class="term info-label">Shell:</text>
  <text x="340" y="266" class="term info-value">zsh</text>

  <!-- Language bars -->
  <text x="280" y="295" class="term info-label">Lang:</text>

  <text x="340" y="295" class="term prompt">TypeScript</text>
  <rect x="340" y="303" width="180" height="10" rx="3" class="bar-bg"/>
  <rect x="340" y="303" width="148" height="10" rx="3" class="bar-fill"/>
  <text x="535" y="295" class="term info-value">82%</text>

  <text x="340" y="320" class="term prompt">JavaScript</text>
  <rect x="340" y="328" width="180" height="10" rx="3" class="bar-bg"/>
  <rect x="340" y="328" width="32" height="10" rx="3" class="bar-fill2"/>
  <text x="535" y="320" class="term info-value">18%</text>

  <!-- Footer separator -->
  <text x="50" y="355" class="term prompt"> ────────────────────</text>

  <!-- Prompt -->
  <text x="50" y="380" class="term prompt">vihisantos@github ~ $</text>
  <text x="248" y="380" class="term cursor">▌</text>
</svg>
